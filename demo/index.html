<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --text: #e2e8f0;
      --muted: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 背景パーティクル ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.4;
    }

    /* ── メインコンテンツ ── */
    main {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 0.3rem 0.9rem;
      border: 1px solid var(--accent);
      border-radius: 999px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 2rem;
      animation: fadeUp 0.8s ease both;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 6rem);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeUp 0.8s 0.15s ease both;
    }

    p {
      margin-top: 1.5rem;
      max-width: 480px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-top: 3rem;
      max-width: 640px;
      width: 100%;
      animation: fadeUp 0.8s 0.45s ease both;
    }

    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 1.5rem 1rem;
      transition: transform 0.2s, border-color 0.2s, background 0.2s;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      background: rgba(124,58,237,0.08);
    }

    .card .icon { font-size: 1.8rem; margin-bottom: 0.6rem; }
    .card .label { font-size: 0.85rem; color: var(--muted); }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.15) 0%, transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: left 0.8s ease, top 0.8s ease;
      z-index: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div class="glow" id="glow"></div>

<main>
  <span class="badge">✦ Made with Claude Code</span>
  <h1>Build fast.<br>Ship anything.</h1>
  <p>AIと一緒に作ると、アイデアがそのままプロダクトになる。コードを書く速さより、考える速さで動く時代。</p>

  <div class="cards">
    <div class="card">
      <div class="icon">⚡</div>
      <div class="label">爆速プロトタイプ</div>
    </div>
    <div class="card">
      <div class="icon">🎨</div>
      <div class="label">即席デザイン</div>
    </div>
    <div class="card">
      <div class="icon">🚀</div>
      <div class="label">GitHub Pages公開</div>
    </div>
  </div>
</main>

<script>
  // パーティクル
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, particles;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initParticles() {
    particles = Array.from({ length: 80 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.5 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.6 + 0.2,
    }));
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(124,58,237,${p.alpha})`;
      ctx.fill();
    }
    // 近い粒子を線でつなぐ
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(124,58,237,${0.15 * (1 - dist/120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }

  resize(); initParticles(); draw();
  window.addEventListener('resize', () => { resize(); initParticles(); });

  // マウス追従グロー
  const glow = document.getElementById('glow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });
</script>
</body>
</html>
